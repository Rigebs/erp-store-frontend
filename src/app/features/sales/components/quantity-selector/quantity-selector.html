<div class="qty-container">
    <button type="button" (click)="adjust(-1)" [disabled]="value() <= 1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <input type="number" [value]="value()" (change)="handleInput($event)">

    <button type="button" (click)="adjust(1)" [disabled]="value() >= stock()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
</div>
