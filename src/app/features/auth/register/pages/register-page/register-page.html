<div class="auth-card">
    <div class="auth-header">
        <h1>Crea tu cuenta</h1>
        <p>Únete a nuestra plataforma hoy mismo</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-field">
            <label for="username">Nombre de usuario</label>
            <input id="username" type="text" formControlName="username" placeholder="Tu nombre de usuario"
                [class.input-error]="registerForm.get('username')?.touched && registerForm.get('username')?.invalid" />
        </div>

        <div class="form-field">
            <label for="email">Correo Electrónico</label>
            <input id="email" type="email" formControlName="email" placeholder="ejemplo@correo.com"
                [class.input-error]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" />
        </div>

        <div class="form-field">
            <label for="password">Contraseña</label>
            <input id="password" type="password" formControlName="password" placeholder="Mínimo 6 caracteres"
                [class.input-error]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" />
        </div>

        @if (errorMessage()) {
        <div class="alert-error">
            {{ errorMessage() }}
        </div>
        }

        <button type="submit" class="btn-primary" [disabled]="isLoading()">
            @if (isLoading()) {
            <span class="loader"></span>
            } @else {
            Registrarse
            }
        </button>
    </form>

    <div class="auth-footer">
        <p>¿Ya tienes una cuenta? <a routerLink="/auth/login">Inicia sesión</a></p>
    </div>
</div>
