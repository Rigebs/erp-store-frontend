<div class="auth-card">
    <div class="auth-header">
        <h1>Bienvenido</h1>
        <p>Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-field">
            <label for="email">Correo Electrónico</label>
            <input id="email" type="email" formControlName="email" placeholder="ejemplo@correo.com"
                [class.input-error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" />
        </div>

        <div class="form-field">
            <label for="password">Contraseña</label>
            <input id="password" type="password" formControlName="password" placeholder="••••••••"
                [class.input-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" />
        </div>

        @if (errorMessage()) {
        <div class="alert-error">
            {{ errorMessage() }}
        </div>
        }

        <button type="submit" class="btn-primary" [disabled]="isLoading()">
            @if (isLoading()) {
            <span class="loader"></span>
            } @else {
            Iniciar Sesión
            }
        </button>
    </form>

    <div class="auth-footer">
        <p>¿No tienes cuenta? <a routerLink="/auth/register">Regístrate aquí</a></p>
    </div>
</div>
