<main class="page-container">
    <header class="page-header">
        <div class="page-header-titles">
            <h1>Almacenes (Multialmacén)</h1>
            <p>Control de ubicaciones, capacidad y stock disponible.</p>
        </div>

        <div class="page-header-actions">
            <button class="btn-header-action" (click)="onOpenWarehouseForm()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                Nuevo Almacén
            </button>
        </div>
    </header>

    <section class="page-content">
        <div class="content-toolbar">
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
                <input type="text" placeholder="Filtrar por nombre o ubicación..." [formControl]="searchControl">
            </div>

            <div class="results-info">
                <strong>{{ totalElements() }}</strong> almacenes encontrados
            </div>
        </div>

        <div class="page-body-grid">
            @if (isLoading()) {
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Sincronizando inventarios...</p>
            </div>
            } @else {
            <div class="warehouse-grid">
                @for (warehouse of warehouses(); track warehouse.id) {
                <app-warehouse-card [warehouse]="warehouse" [isMenuOpen]="openMenuId() === warehouse.id"
                    (toggleMenu)="toggleMenu(warehouse.id, $event)" (edit)="onOpenWarehouseForm(warehouse)"
                    (toggleStatus)="onToggleWarehouseStatus(warehouse)" (delete)="onDeleteWarehouse(warehouse.id)"
                    (viewInventory)="goToInventory(warehouse)" (transferStock)="openTransferModal(warehouse)" />
                }
            </div>
            }
        </div>
    </section>
</main>
