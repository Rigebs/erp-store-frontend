<main class="page-container">
    <header class="page-header">
        <div class="header-content">
            <h1>{{ isEditMode() ? 'Editar' : 'Nuevo' }} Producto</h1>
            <p class="subtitle">Gestiona la información detallada de tu inventario</p>
        </div>
    </header>

    <form [formGroup]="form" (ngSubmit)="save()" class="standard-form">
        <div class="form-section">
            <div class="grid">
                <label>
                    Nombre del Producto
                    <input type="text" formControlName="name" placeholder="Ej. Laptop Pro 15"
                        [class.invalid]="form.get('name')?.touched && form.get('name')?.invalid">
                    <app-form-error [control]="form.get('name')"></app-form-error>
                </label>

                <label>
                    SKU / Código Interno
                    <input type="text" formControlName="sku" placeholder="SKU-001"
                        [class.invalid]="form.get('sku')?.touched && form.get('sku')?.invalid">
                    <app-form-error [control]="form.get('sku')"></app-form-error>
                </label>
                <label>
                    Código de Barras
                    <input type="text" formControlName="barcode" placeholder="750123456789"
                        [class.invalid]="isInvalid('barcode')">
                    <app-form-error [control]="form.get('barcode')"></app-form-error>
                </label>
            </div>

            <label>
                Descripción Detallada
                <textarea formControlName="description" placeholder="Describe las características..."></textarea>
                <app-form-error [control]="form.get('description')"></app-form-error>
            </label>
        </div>

        <div class="form-section">
            <h2 class="section-title">Clasificación</h2>
            <div class="grid">
                <div class="field">
                    <label>Categoría</label>
                    <app-select-searchable formControlName="category" [options]="categories()" labelKey="name">
                    </app-select-searchable>
                    <app-form-error [control]="form.get('category')"></app-form-error>
                </div>

                <div class="field">
                    <label>Marca</label>
                    <app-select-searchable formControlName="brand" [options]="brands()" labelKey="name">
                    </app-select-searchable>
                    <app-form-error [control]="form.get('brand')"></app-form-error>
                </div>
                <div class="field">
                    <label>Unidad de Medida</label>
                    <app-select-searchable formControlName="unitMeasure" [options]="units()" labelKey="name">
                    </app-select-searchable>
                    <app-form-error [control]="form.get('unitMeasure')"></app-form-error>
                </div>
                <label>
                    Stock Mínimo (Alerta)
                    <input type="number" formControlName="minStock" placeholder="0"
                        [class.invalid]="isInvalid('minStock')">
                    <app-form-error [control]="form.get('minStock')"></app-form-error>
                </label>
            </div>
        </div>

        <div class="form-section">
            <h2 class="section-title">Precios</h2>
            <div class="grid">
                <label>
                    Precio Compra
                    <input type="number" formControlName="purchasePrice" step="0.01" placeholder="0.00"
                        [class.invalid]="form.get('purchasePrice')?.touched && form.get('purchasePrice')?.invalid">
                    <app-form-error [control]="form.get('purchasePrice')"></app-form-error>
                </label>

                <label>
                    Precio Venta
                    <input type="number" formControlName="salePrice" step="0.01" placeholder="0.00"
                        [class.invalid]="form.get('salePrice')?.touched && form.get('salePrice')?.invalid">
                    <app-form-error [control]="form.get('salePrice')"></app-form-error>
                </label>
            </div>
        </div>

        <div class="form-section">
            <h2 class="section-title">Multimedia y Estado</h2>

            <div class="field">
                <label>Imagen del Producto</label>

                <app-image-uploader [imageUrl]="form.get('imageUrl')?.value ?? null" [isLoading]="isUploadingImage()"
                    (upload)="onImageUpload($event)" (remove)="onImageRemove()">
                </app-image-uploader>

                <app-form-error [control]="form.get('imageUrl')"></app-form-error>
            </div>

            <div class="status-group">
                <label class="checkbox-label">
                    <input type="checkbox" formControlName="enabled">
                    <span>Producto activo para la venta</span>
                </label>
            </div>
        </div>

        <footer class="form-actions">
            <button type="button" class="btn btn-secondary" routerLink="/inventory/products">
                Cancelar
            </button>
            <button type="submit" class="btn btn-primary" [disabled]="isLoading()">
                {{ isLoading() ? 'Guardando...' : (isEditMode() ? 'Actualizar' : 'Crear') }}
            </button>
        </footer>
    </form>
</main>
