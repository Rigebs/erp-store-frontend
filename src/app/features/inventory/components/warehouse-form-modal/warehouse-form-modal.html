<app-modal-container (close)="handleClose()">
    <h2 modal-header [style.margin]="'0'">
        {{ warehouse() ? 'Editar Almacén' : 'Registrar Almacén' }}
    </h2>

    <form [formGroup]="warehouseForm" (ngSubmit)="handleSubmit()" id="warehouseForm" class="warehouse-form">
        <div class="form-grid">

            <div class="field-group full-width">
                <label>Sucursal / Sede Responsable</label>
                <app-select-searchable formControlName="branch" [options]="branches()" labelKey="name"
                    placeholder="Busca una sucursal..." (onSearch)="onSearchBranches($event)">
                </app-select-searchable>
                @if (warehouseForm.controls.branch.invalid && warehouseForm.controls.branch.touched) {
                <span class="error-text">La sucursal es obligatoria</span>
                }
            </div>

            <div class="field-group full-width">
                <label for="name">Nombre del Almacén</label>
                <input id="name" type="text" formControlName="name" placeholder="Ej. Almacén de Despacho Norte">
            </div>

            <div class="field-group">
                <label for="type">Tipo de Inventario</label>
                <select id="type" formControlName="type">
                    <option value="" disabled>Seleccione un tipo</option>
                    @for (item of warehouseTypes; track item.value) {
                    <option [value]="item.value">{{ item.label }}</option>
                    }
                </select>
            </div>

            <div class="field-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" formControlName="main">
                    ¿Es Almacén Principal?
                </label>
            </div>

            <div class="field-group full-width">
                <label for="location">Ubicación Física</label>
                <input id="location" type="text" formControlName="location" placeholder="Piso, Pasillo o Coordenadas">
            </div>

            <div class="field-group full-width">
                <label for="description">Notas Internas</label>
                <textarea id="description" formControlName="description" rows="2"
                    placeholder="Información relevante para el personal..."></textarea>
            </div>
        </div>
    </form>

    <div modal-footer class="form-actions">
        <button type="button" class="btn-secondary" (click)="handleClose()">
            Cancelar
        </button>
        <button type="submit" form="warehouseForm" class="btn-primary"
            [disabled]="warehouseForm.invalid || isSubmitting()">
            {{ isSubmitting() ? 'Guardando...' : 'Guardar Almacén' }}
        </button>
    </div>
</app-modal-container>
