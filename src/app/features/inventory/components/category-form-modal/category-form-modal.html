<div class="modal-overlay" (click)="close()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <header class="modal-header">
            <h2>Registrar Categoría</h2>
            <button type="button" class="btn-close" (click)="close()">×</button>
        </header>

        <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="modal-form">
            <div class="form-group">
                <label for="name">Nombre</label>
                <input id="name" type="text" formControlName="name" [class.invalid]="isFieldInvalid('name')"
                    placeholder="Ej. Electrónicos" />
            </div>

            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea id="description" formControlName="description" [class.invalid]="isFieldInvalid('description')"
                    placeholder="Breve descripción de la categoría" rows="3"></textarea>
            </div>

            <footer class="modal-actions">
                <button type="button" class="btn-secondary" (click)="close()">
                    Cancelar
                </button>
                <button type="submit" class="btn-primary" [disabled]="categoryForm.invalid">
                    Guardar
                </button>
            </footer>
        </form>
    </div>
</div>
