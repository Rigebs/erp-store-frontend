<app-modal-container (close)="close()">
    <h2 modal-header>Filtros de Búsqueda</h2>

    <form [formGroup]="filterForm" class="filter-form">
        <div class="filter-grid">
            <div class="form-group">
                <label>Categoría</label>
                <app-select-searchable formControlName="category" [options]="categories()" labelKey="name"
                    (onSearch)="handleSearchCategories($event)" (onNextPage)="handleNextCategories()"
                    placeholder="Todas las categorías" />
            </div>

            <div class="form-group">
                <label>Marca</label>
                <app-select-searchable formControlName="brand" [options]="brands()" labelKey="name"
                    (onSearch)="handleSearchBrands($event)" (onNextPage)="handleNextBrands()"
                    placeholder="Todas las marcas" />
            </div>

            <div class="form-group">
                <label>Unidad de Medida</label>
                <app-select-searchable formControlName="unitMeasure" [options]="unitMeasures()" labelKey="name"
                    (onSearch)="handleSearchUnits($event)" (onNextPage)="handleNextUnits()"
                    placeholder="Seleccionar unidad" />
            </div>

            <div class="form-group">
                <label>Almacén</label>
                <app-select-searchable formControlName="warehouse" [options]="warehouses()" labelKey="name"
                    (onSearch)="handleSearchWarehouses($event)" (onNextPage)="handleNextWarehouses()"
                    placeholder="Seleccionar almacén" />
            </div>

            <div class="form-group">
                <label>Estado</label>
                <select formControlName="enabled" class="filter-input">
                    <option [ngValue]="null">Todos los estados</option>
                    <option [ngValue]="true">Activos</option>
                    <option [ngValue]="false">Inactivos</option>
                </select>
            </div>

            <div class="form-group">
                <label>Precio Mínimo</label>
                <input type="number" formControlName="minPrice" class="filter-input" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>Precio Máximo</label>
                <input type="number" formControlName="maxPrice" class="filter-input" placeholder="0.00">
            </div>
        </div>
    </form>

    <div modal-footer class="filter-actions">
        <button type="button" class="btn-secondary" (click)="onReset()">Limpiar</button>
        <button type="button" class="btn-primary" (click)="onApply()">Aplicar Filtros</button>
    </div>
</app-modal-container>
