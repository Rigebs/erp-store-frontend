<div class="sidebar-header">
    <span class="brand-name" [class.hidden-collapsed]="isCollapsed()">App Dashboard</span>

    <button type="button" class="toggle-btn" (click)="toggleSidebar()"
        [attr.aria-label]="isCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            [style.transform]="isCollapsed() ? 'rotate(180deg)' : 'none'">
            <path d="M15 18l-6-6 6-6" />
        </svg>
    </button>
</div>

<nav class="nav-list">
    @for (item of items(); track item.route) {
    <div class="nav-group">
        @if (item.children && item.children.length > 0) {
        <button type="button" class="nav-item" (click)="toggleSubmenu(item.route, $event)" [title]="item.label">
            <span class="icon">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path [attr.d]="item.iconSvgPath" />
                </svg>
            </span>
            <span class="label" [class.hidden-collapsed]="isCollapsed()">{{ item.label }}</span>
            <span class="arrow" [class.hidden-collapsed]="isCollapsed()" [class.rotated]="isExpanded(item.route)">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </span>
        </button>

        @if (isExpanded(item.route) && !isCollapsed()) {
        <div class="submenu">
            @for (sub of item.children; track sub.route) {
            <a [routerLink]="sub.route" routerLinkActive="active" class="nav-item submenu-item">
                <span class="label">{{ sub.label }}</span>
            </a>
            }
        </div>
        }
        } @else {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" [title]="item.label">
            <span class="icon">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path [attr.d]="item.iconSvgPath" />
                </svg>
            </span>
            <span class="label" [class.hidden-collapsed]="isCollapsed()">{{ item.label }}</span>
        </a>
        }
    </div>
    }
</nav>

<div class="sidebar-footer" [class.collapsed]="isCollapsed()">
    <div class="user-container" [title]="isCollapsed() ? 'Admin User (Administrator)' : ''">
        <div class="user-profile">
            <div class="avatar-wrapper">
                <svg viewBox="0 0 24 24" fill="currentColor" class="avatar-icon">
                    <path
                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                </svg>
                <span class="status-indicator"></span>
            </div>

            <div class="user-info" [class.hidden-collapsed]="isCollapsed()">
                <p class="user-name">Admin User</p>
                <p class="user-role">Administrator</p>
            </div>
        </div>

        <button class="logout-btn" title="Cerrar Sesión">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>
    </div>
</div>
