<div class="toast-wrapper">
    @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast-card" [class]="toast.type">
        <div class="content">
            <h4>{{ toast.title }}</h4>
            <p>{{ toast.message }}</p>
        </div>
        <button class="close-btn" (click)="toastService.remove(toast.id)">&times;</button>
    </div>
    }
</div>
